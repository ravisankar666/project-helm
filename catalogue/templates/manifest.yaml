apiVersion: v1
kind: configMap
metadata: 
  name: catalogue
  namespace: roboshop
data:
   MONGO: "true"
   MONGO_URL: {{ .Values.configmap.mongoURL}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
 name: catalogue
 namespace: roboshop
 labels:
    project: roboshop
    coponent: catalogue
    teir: backend
spec:
  replicas: 1
  selector:
  #these labels are used to select pods
    matchLables:
     project: roboshop
     componet: catalogue
     teir: backend
  # pod definition
  template:
   metadata:
      labels:
        project: roboshop
        component: catalogue
        teir: backend
  spec:
    containers:
    - name: catalogue
      image: "{{ .Values.deployment.imageRepo }}:{{ .Values.deployment.imageVersion}}"
      imagePullPolicy: Always
      envFrom:
      - configMapRef:
          name: catalogue
      readinessProbe:
          httpGet:   
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
      livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---            

apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: catalogue
    tier: backend
  ports:
    - protocol: TCP
      port: {{ .Values.service.servicePort }} # service port
      targetPort: 8080 # container port